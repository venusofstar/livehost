<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Stream Portal</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>Register for Live Streaming</h1>
<input type="text" id="username" placeholder="Enter username">
<button onclick="register()">Register</button>

<div id="info"></div>

<script>
async function register(){
    const username = document.getElementById('username').value;
    if(!username) { alert('Enter username'); return; }

    const res = await fetch('http://127.0.0.1:3000/register',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({username})
    });
    const data = await res.json();
    if(data.error){
        document.getElementById('info').innerText = data.error;
    }else{
        document.getElementById('info').innerHTML = `
        <p>Username: <b>${data.username}</b></p>
        <p>Stream Key: <b>${data.streamKey}</b></p>
        <p>RTMP URL: <b>${data.rtmp}</b></p>
        <p>M3U8 Link: <b>${data.m3u8}</b></p>
        <p>Playlist for IPTV: <a href="http://YOUR_DOMAIN:3000/playlist.m3u">Click here</a></p>`;
    }
}
</script>
</body>
</html>
