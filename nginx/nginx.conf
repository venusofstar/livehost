worker_processes auto;

events {
    worker_connections 1024;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        application live {
            live on;
            record off;

            # HLS settings
            hls on;
            hls_path /var/www/hls;
            hls_fragment 3;
            hls_playlist_length 60;

            # Validate RTMP stream with Node backend
            on_publish http://127.0.0.1:3000/auth;
        }
    }
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 8080;

        # HLS streaming
        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root /var/www;
            add_header Cache-Control no-cache;
        }

        # Frontend registration page
        location / {
            root /var/www/html;    # Make sure Docker COPY places index.html here
            index index.html;
            try_files $uri $uri/ =404;  # Avoid "Cannot GET /" errors
        }

        # Optional: CORS for frontend fetching backend
        location /register {
            proxy_pass http://127.0.0.1:3000/register;
        }
    }
}
